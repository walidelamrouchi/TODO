{% extends "base.html" %} {% load static %} {% block content %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'styles/inbox.css' %}" />
    <title>index</title>
  </head>
  <body>
    <div class="list-tasks">
      {% for task in tasks %}
        <div class="task-item">
        <!-- checkbox form — stops click from going to detail page -->
        <form action="{% url 'TaskToggle' task.id %}" method="POST">
          {% csrf_token %}
          <div class="checkbox-container">
            <input
                type="checkbox"
                id="task-{{ task.id }}"
                class="task-checkbox"
                onchange="this.form.submit()"
                {% if task.is_done %}
                checked
                {%endif %}
             
            />
            <label for="task-{{ task.id }}" class="checkbox-label">
              <div class="checkbox-box">
                <div class="checkbox-fill"></div>
                <div class="checkmark">
                  <svg viewBox="0 0 24 24" class="check-icon">
                    <path
                      d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"
                    ></path>
                  </svg>
                </div>
                <div class="success-ripple"></div>
              </div>
              <span class="checkbox-text">{{ task.title }}  at {{ task.due_date | date:"M d y" }} </span>
            </label>
        </div>
        </form>
        <a href="{% url "TaskDetail" task.id %}" class="item-details-link">View Delails</a>
      </div>
    </div>
      {% endfor %}
    </div>
  </body>
</html>
{% endblock content %}
