{% load static %}

<form method="POST" action="{% url 'TaskDelete' task.id %}">
  {% csrf_token %}
  <div class="confirm-box">
    <div class="head-confirm">
      <h3 class="title-confirm">Delete task?</h3>
      <p class="title-confirm-info">
        <span>{{ task.title }}</span> will be permanently deleted.
      </p>
    </div>
    <div class="btn-action">
      <div class="cancel-btn">Cancel</div>
      <button type="submit" class="detelet-bnt">Delete</button>
    </div>
  </div>
</form>
