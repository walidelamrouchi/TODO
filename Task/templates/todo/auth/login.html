
{% extends "base.html" %}
{% load static %}
{% block content %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>
    <link rel="stylesheet" href="{% static "styles/signup.css" %}" />
  </head>
  <body>
    
     <div class="form-box">
    <form class="form" method='post'>
      {% csrf_token %}
      <p class="title">Login</p>
    
      
        {% for message in messages %}
      <div class="{{ message.tags }}">
        {{ message }}
      </div>
        {% endfor %}
      

      <label>
        <input  placeholder="" type="text" class="input" name='Username'/>
        <span>Username</span>
      </label>

      <label>
        <input  placeholder="" type="password" class="input" name='Password'/>
        <span>Password</span>
      </label>
     
      </label>
      <button class="submit">Submit</button>
      <p class="signin">not have an acount ? <a href="{% url "login" %}">Signin</a></p>
    </form>
    </div>
  </body>
</html>
{% endblock content %}
