<html>
  <body>
  

{% load static %}
<link rel="stylesheet" href="{% static 'styles/sidebar.css' %}" />

<!-- TOGGLE BUTTON — always visible -->
<aside class="sidebar" id="sidebar">

  <div class='sidebar__head'>
  <em class='title__head'>todoit</em>
  <button
    class="sidebar__toggle-btn"
    id="sidebarToggleBtn"
    onclick="toggleSidebar()"
  >
    <svg width="20px" height="20px" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="#000000" class="bi bi-layout-sidebar"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M0 3a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3zm5-1v12h9a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1H5zM4 2H2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h2V2z"></path> </g></svg>
  </button>
  </div>
  
  <div  class="sidebar__add-task" id="AddTask" onclick='addtaskopen()'>
    <span class="sidebar__icon">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="16" />
        <line x1="8" y1="12" x2="16" y2="12" />
      </svg>
    </span>
    <span class="sidebar__label">Add task</span>
  </div>

  <nav class="sidebar__nav">
    <a
      href="{% url 'inbox' %}"
      class="sidebar__item {% if request.resolver_match.url_name == 'inbox' %}sidebar__item--active{% endif %}"
    >
      <span class="sidebar__icon">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="22 12 16 12 14 15 10 15 8 12 2 12" />
          <path
            d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"
          />
        </svg>
      </span>
    
      <span class="sidebar__label">Inbox</span>
      <span class="sidebar__count">{{inbox_count}}</span>
      
    </a>
    <a href="{% url "today" %}" class="sidebar__item {% if request.resolver_match.url_name == 'today' %}sidebar__item--active{% endif %}">
      <span class="sidebar__icon">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
      </span>
      <span class="sidebar__label">Today</span>
      <span class="sidebar__count sidebar__count--red">{{today_count}}</span>
      
    </a>

    <a href="{% url "completed" %}" class="sidebar__item {% if request.resolver_match.url_name == 'completed' %} sidebar__item--active{% endif %}">
      <span class="sidebar__icon">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </span>
      <span class="sidebar__label">Completed</span>
    </a>
  </nav>

  <div class="sidebar__bottom">
      <a href="{% url "logout" %}" class="sidebar__item ">
        <span class="sidebar__icon">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </span>
        <span class="sidebar__label">Logout</span>
      </a>
      <div class="sidebar__user">
        <div class="sidebar__avatar">{{ request.user.username|first|upper }}</div>
        <span class="sidebar__label">{{ request.user.username }}</span>
      </div>
    
  </div>
</aside>
{% block extra_js %}
<script src="{% static "scripts/sidebar.js" %}"></script>
{% endblock extra_js %}
</body></html>
